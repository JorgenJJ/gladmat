    header {
      background: linear-gradient(135deg, #1a3a2a 0%, #2d5a3d 60%, #3d7a52 100%);
      color: #fff;
      padding: 32px 24px 24px;
      text-align: center;
    }
    header .eyebrow {

      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    header p { margin: 8px 0 0; opacity: 0.8; font-size: 14px; }
    .header-pills {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .header-pill {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
    }

    /* Controls */
    .controls {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 18px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    #søk {
      width: 100%;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid #d1d5db;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      color: #111;
      font-family: inherit;
    }
    #søk:focus { border-color: #2d5a3d; }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid;
      transition: all 0.15s;
      font-family: inherit;
    }
    .toggle-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toggle-row label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid #e5e7eb;
      background: #f9fafb;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
      white-space: nowrap;
      line-height: 1.3;
    }
    .toggle-row label:hover { color: #4b5563; border-color: #d1d5db; }
    .toggle-row label:has(input:checked) {
      background: #1a3a2a;
      color: #fff;
      border-color: #1a3a2a;
    }
    .toggle-row label:focus-within {
      outline: 2px solid #2d5a3d;
      outline-offset: 2px;
    }
    .toggle-row input[type=checkbox] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }
    #teller {
      margin-left: auto;
      font-size: 12px;
      color: #6b7280;
    }

    /* Tabell */
    .table-wrap {
      padding: 18px 16px 0;
      max-width: 1100px;
      margin: 0 auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      table-layout: fixed;
    }
    thead tr {
      background: #1a3a2a;
      color: #fff;
    }
    thead th {
      text-align: left;
      padding: 10px 14px;
      font-weight: 700;
      white-space: nowrap;
    }
    thead th:nth-child(1) { border-radius: 8px 0 0 0; width: 24%; }
    thead th:nth-child(2) { width: 44%; }
    thead th:nth-child(3) { width: 20%; }
    thead th:nth-child(4) { text-align: right; border-radius: 0 8px 0 0; width: 12%; }

    /* Gruppeoverskrift pr. serveringssted */
    tr.group-head td {
      background: #eef3f0;
      color: #1a3a2a;
      font-weight: 800;
      font-size: 15px;
      padding: 11px 14px;
      border-top: 2px solid #1a3a2a;
    }
    .rest-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-left: 10px;
      vertical-align: middle;
      letter-spacing: 0.1px;
    }

    tbody tr.dish { border-bottom: 1px solid #e5e7eb; }
    tr.dish td { padding: 10px 14px; vertical-align: top; word-wrap: break-word; }
    tr.dish.veg { background: #f0fdf4; }
    td.rett-navn { font-weight: 700; }
    td.besk { color: #4b5563; line-height: 1.5; }
    td.pris { text-align: right; font-weight: 700; color: #1a3a2a; white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 3px;
      margin-bottom: 2px;
      white-space: nowrap;
      border: 1px solid;
    }
    .ingen { color: #d1d5db; font-size: 12px; }

    #tom-melding {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }
    footer {
      text-align: center;
      margin-top: 32px;
      color: #9ca3af;
      font-size: 12px;
    }

    /* Mobil: tabell → kort, ingen horisontal scroll */
    @media (max-width: 640px) {
      header { padding: 24px 20px 18px; }
      header h1 { font-size: 26px; }
      header p { font-size: 13px; }

      .controls { padding: 12px 14px 10px; }
      #søk { padding: 10px 14px; font-size: 15px; margin-bottom: 9px; }
      .filter-btn { padding: 7px 13px; font-size: 12.5px; }
      .toggle-row label {
        flex: 1 1 0;
        padding: 7px 10px;
        font-size: 13px;
        min-width: 0;
      }
      #teller {
        flex: 1 0 100%;
        margin: 6px 0 0;
        text-align: right;
      }

      .table-wrap { padding: 6px 14px 0; }
      table, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }

      tr.group-head td {
        background: transparent;
        border: none;
        border-left: 4px solid #2d5a3d;
        border-radius: 0;
        margin: 24px 0 10px;
        padding: 0 0 0 12px;
        font-size: 17px;
        letter-spacing: -0.2px;
        line-height: 1.25;
      }
      tr.group-head:first-child td { margin-top: 6px; }

      tr.dish {
        position: relative;
        border: 1px solid #ebe9e4;
        border-radius: 14px;
        background: #fff;
        margin-bottom: 12px;
        padding: 16px 18px;
        box-shadow: 0 2px 10px rgba(26,58,42,0.06);
      }
      tr.dish.veg { border-color: #bbf0d2; background: #f5fdf9; }
      tr.dish td { padding: 0; border: none; }

      td.rett-navn {
        font-size: 16px;
        line-height: 1.3;
        color: #1a3a2a;
        margin-bottom: 7px;
        padding-right: 58px;

        padding: 0;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.2px;
        line-height: 1;

const typeColors = {
  "Vegetarisk": { bg: "#d1fae5", text: "#065f46", border: "#6ee7b7" },
  "Vegan":       { bg: "#bbf7d0", text: "#14532d", border: "#4ade80" },
  "Kjøtt":       { bg: "#fee2e2", text: "#7f1d1d", border: "#fca5a5" },
  "Sjømat":      { bg: "#dbeafe", text: "#1e3a8a", border: "#93c5fd" },
  "Glutenfritt": { bg: "#fef3c7", text: "#78350f", border: "#fcd34d" },
  "Laktosefritt":{ bg: "#f3e8ff", text: "#4c1d95", border: "#c4b5fd" },
};

const ALLE_TYPER = ["Vegetarisk", "Vegan", "Kjøtt", "Sjømat", "Glutenfritt", "Laktosefritt"];
const isVegetar = r => r.type.includes("Vegetarisk") || r.type.includes("Vegan");

// State
let aktiveFilter = new Set(); // tom = vis alle
let visFestival = true;
let visRestaurant = true;
let søkTekst = "";

// Header stats
const vegSteder = [...new Set(retter.filter(isVegetar).map(r => r.sted))];
document.getElementById("header-sub").textContent =
  `Gladmatretter til 50 eller 75 kr · ${retter.length} retter · ${[...new Set(retter.map(r => r.sted))].length} serveringssteder`;
document.getElementById("pill-veg").textContent = `🥦 ${vegSteder.length} steder med vegetar/vegan`;
document.getElementById("pill-rest").textContent = `🍽 ${retter.filter(r => r.restaurant).length} retter på restaurant`;

function styleFilterBtn(btn, active) {
  const t = btn.dataset.type;
  const c = typeColors[t];
  if (active) {
    btn.style.background = "#1a3a2a";
    btn.style.color = "#fff";
    btn.style.borderColor = "#1a3a2a";
  } else {
    btn.style.background = c ? c.bg : "#f3f4f6";
    btn.style.color = c ? c.text : "#374151";
    btn.style.borderColor = c ? c.border : "#d1d5db";
  }
}

// Build filter buttons
const filterRow = document.getElementById("filter-row");

// "Alle" reset button
const alleBtn = document.createElement("button");
alleBtn.className = "filter-btn";
alleBtn.textContent = "Alle";
alleBtn.dataset.type = "Alle";
styleFilterBtn(alleBtn, true);
alleBtn.addEventListener("click", () => {
  aktiveFilter.clear();
  document.querySelectorAll(".filter-btn").forEach(b => styleFilterBtn(b, b.dataset.type === "Alle"));
  render();
});
filterRow.appendChild(alleBtn);

ALLE_TYPER.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "filter-btn";
  btn.textContent = t;
  btn.dataset.type = t;
  styleFilterBtn(btn, false);
  btn.addEventListener("click", () => {
    if (aktiveFilter.has(t)) {
      aktiveFilter.delete(t);
    } else {
      aktiveFilter.add(t);
    }
    // Update button styles
    const ingenValgt = aktiveFilter.size === 0;
    document.querySelectorAll(".filter-btn").forEach(b => {
      if (b.dataset.type === "Alle") {
        styleFilterBtn(b, ingenValgt);
      } else {
        styleFilterBtn(b, aktiveFilter.has(b.dataset.type));
      }
    });
    render();
  });
  filterRow.appendChild(btn);
});

// Event listeners
document.getElementById("søk").addEventListener("input", e => {
  søkTekst = e.target.value.toLowerCase();
  render();
});
document.getElementById("vis-festival").addEventListener("change", e => {
  visFestival = e.target.checked;
  render();
});
document.getElementById("vis-restaurant").addEventListener("change", e => {
  visRestaurant = e.target.checked;
  render();
});

function makeBadge(type) {
  const c = typeColors[type] || { bg: "#f3f4f6", text: "#374151", border: "#d1d5db" };
  return `<span class="badge" style="background:${c.bg};color:${c.text};border-color:${c.border}">${type}</span>`;
}

function render() {
  const filtrert = retter.filter(r => {
    const matchFilter = aktiveFilter.size === 0 || r.type.some(t => aktiveFilter.has(t));
    const matchKategori = r.restaurant ? visRestaurant : visFestival;
    const matchSøk = !søkTekst ||
      r.sted.toLowerCase().includes(søkTekst) ||
      r.rett.toLowerCase().includes(søkTekst) ||
      r.beskrivelse.toLowerCase().includes(søkTekst);
    return matchFilter && matchKategori && matchSøk;
  });

  document.getElementById("teller").textContent =
    `Viser ${filtrert.length} av ${retter.length} retter`;

  // Group by sted
  const grouped = {};
  filtrert.forEach(r => {
    const key = r.sted + (r.restaurant ? "__rest" : "");
    if (!grouped[key]) grouped[key] = { sted: r.sted, restaurant: !!r.restaurant, retter: [] };
    grouped[key].retter.push(r);
  });

  const sortedKeys = Object.keys(grouped).sort((a, b) => {
    const na = grouped[a].sted.replace(/[ÆæØøÅå]/g, c =>
      ({ Æ:"AE",æ:"ae",Ø:"O",ø:"o",Å:"AA",å:"aa" })[c] || c);
    const nb = grouped[b].sted.replace(/[ÆæØøÅå]/g, c =>
      ({ Æ:"AE",æ:"ae",Ø:"O",ø:"o",Å:"AA",å:"aa" })[c] || c);
    return na.localeCompare(nb);
  });

  const tbody = document.getElementById("tbody");
  const tomMelding = document.getElementById("tom-melding");
  const tabell = document.getElementById("tabell");

  if (sortedKeys.length === 0) {
    tbody.innerHTML = "";
    tomMelding.style.display = "block";
    tabell.style.display = "none";
    return;
  }

  tomMelding.style.display = "none";
  tabell.style.display = "";

  let html = "";
  sortedKeys.forEach((key) => {
    const gruppe = grouped[key];
    const erRestaurant = gruppe.restaurant;

    html += `<tr class="group-head${erRestaurant ? " rest" : ""}">
      <td colspan="4">${gruppe.sted}${erRestaurant ? `<span class="rest-label">🍽 Gladmat på restaurant</span>` : ""}</td>
    </tr>`;

    gruppe.retter.forEach((r) => {
      const erVeg = isVegetar(r);
      const badges = r.type.length
        ? r.type.map(makeBadge).join("")
        : `<span class="ingen">–</span>`;

      html += `<tr class="dish${erVeg ? " veg" : ""}">
        <td class="rett-navn">${r.rett}</td>
        <td class="besk">${r.beskrivelse}</td>
        <td class="kjennetegn">${badges}</td>
        <td class="pris">${r.pris} kr</td>
      </tr>`;
    });
  });

  tbody.innerHTML = html;
}

// Initial render
render();

// Register service worker for PWA support
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("Service worker registration failed:", err);
    });
  });
}
